name: Build EasePi R1 Firmware

on:
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: OpenWrt git tag
        required: true
        default: v25.12.0
      openclash_ref:
        description: OpenClash git ref
        required: true
        default: master
      rootfs_partsize:
        description: RootFS partition size in MB
        required: true
        default: "1024"
      extra_packages:
        description: Extra package names, separated by spaces
        required: false
        default: ""
      remove_packages:
        description: Packages to remove, separated by spaces
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-openwrt.yml"
      - "config/**"
      - "files/**"
      - "scripts/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      OPENWRT_TAG: ${{ github.event.inputs.openwrt_tag || 'v25.12.0' }}
      OPENCLASH_REF: ${{ github.event.inputs.openclash_ref || 'master' }}
      ROOTFS_PARTSIZE: ${{ github.event.inputs.rootfs_partsize || '1024' }}
      EXTRA_PACKAGES: ${{ github.event.inputs.extra_packages || '' }}
      REMOVE_PACKAGES: ${{ github.event.inputs.remove_packages || '' }}
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bzip2 ccache clang curl file flex g++ gawk gcc-multilib \
            gettext git jq libelf-dev libncurses-dev libssl-dev patch python3 \
            python3-pyelftools python3-setuptools rsync subversion swig tar unzip \
            wget xsltproc zlib1g-dev zstd

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.OPENWRT_TAG }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 --branch "${OPENWRT_TAG}" https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download OpenClash APK
        run: |
          mkdir -p openwrt/files/root
          apk_url="$(curl -fsSL https://api.github.com/repos/vernesong/OpenClash/releases/latest | jq -r '.assets[] | select(.name | endswith(\".apk\")) | .browser_download_url' | head -n 1)"
          test -n "${apk_url}"
          test "${apk_url}" != "null"
          curl -fL "${apk_url}" -o openwrt/files/root/luci-app-openclash.apk
          ls -lh openwrt/files/root/luci-app-openclash.apk

      - name: Copy custom files
        run: |
          mkdir -p openwrt/files
          rsync -a files/ openwrt/files/

      - name: Prepare .config
        run: |
          chmod +x scripts/prepare_config.sh
          ./scripts/prepare_config.sh openwrt config/easepi-r1.seed

      - name: Expand defconfig
        working-directory: openwrt
        run: |
          make defconfig
          grep -E 'CONFIG_TARGET_|CONFIG_PACKAGE_luci-app-openclash|CONFIG_TARGET_ROOTFS_PARTSIZE' .config

      - name: Download sources
        working-directory: openwrt
        run: |
          make download -j"$(nproc)"

      - name: Build firmware
        working-directory: openwrt
        run: |
          set -o pipefail
          make -j2 V=s 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          cp openwrt/.config artifacts/ || true
          cp build.log artifacts/ || true
          find openwrt/bin/targets/rockchip/armv8 -maxdepth 1 -type f \
            \( -name '*.img.gz' -o -name '*.itb' -o -name '*.manifest' -o -name 'sha256sums' -o -name 'profiles.json' -o -name 'config.buildinfo' -o -name 'feeds.buildinfo' -o -name 'version.buildinfo' \) \
            -exec cp {} artifacts/ \; || true
          if ls artifacts/* >/dev/null 2>&1; then
            sha256sum artifacts/* > artifacts/sha256sums
          fi
          ls -lah artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: easepi-r1-openwrt-${{ env.OPENWRT_TAG }}
          path: artifacts/
          if-no-files-found: warn
