name: Build EasePi R1 Firmware

on:
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: OpenWrt git tag
        required: true
        default: v25.12.0
      openclash_ref:
        description: OpenClash git ref
        required: true
        default: master
      rootfs_partsize:
        description: RootFS partition size in MB
        required: true
        default: "1024"
      extra_packages:
        description: Extra package names, separated by spaces
        required: false
        default: ""
      remove_packages:
        description: Packages to remove, separated by spaces
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-openwrt.yml"
      - "config/**"
      - "files/**"
      - "scripts/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      OPENWRT_TAG: ${{ github.event.inputs.openwrt_tag || 'v25.12.0' }}
      OPENCLASH_REF: ${{ github.event.inputs.openclash_ref || 'master' }}
      ROOTFS_PARTSIZE: ${{ github.event.inputs.rootfs_partsize || '1024' }}
      EXTRA_PACKAGES: ${{ github.event.inputs.extra_packages || '' }}
      REMOVE_PACKAGES: ${{ github.event.inputs.remove_packages || '' }}
      PROFILE: linkease_easepi-r1
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl file git make rsync tar unzip wget zstd

      - name: Download ImageBuilder
        run: |
          OPENWRT_VERSION="${OPENWRT_TAG#v}"
          curl -fL "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/rockchip/armv8/openwrt-imagebuilder-${OPENWRT_VERSION}-rockchip-armv8.Linux-x86_64.tar.zst" -o imagebuilder.tar.zst
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst
          mv "openwrt-imagebuilder-${OPENWRT_VERSION}-rockchip-armv8.Linux-x86_64" imagebuilder

      - name: Download OpenClash APK
        run: |
          mkdir -p imagebuilder/files/root
          rm -rf /tmp/openclash-package
          git clone --depth 1 --branch package https://github.com/vernesong/OpenClash.git /tmp/openclash-package
          case "${OPENCLASH_REF}" in
            dev) apk_source="$(find /tmp/openclash-package/dev -maxdepth 1 -type f -name '*.apk' | head -n 1)" ;;
            *) apk_source="$(find /tmp/openclash-package/master -maxdepth 1 -type f -name '*.apk' | head -n 1)" ;;
          esac
          test -n "${apk_source}"
          cp "${apk_source}" imagebuilder/files/root/luci-app-openclash.apk
          ls -lh imagebuilder/files/root/luci-app-openclash.apk

      - name: Copy custom files
        run: |
          rsync -a files/ imagebuilder/files/

      - name: Build firmware
        run: |
          set -o pipefail
          remove_package_args=""
          for pkg in ${REMOVE_PACKAGES}; do
            remove_package_args="${remove_package_args} -${pkg}"
          done
          OPENWRT_VERSION="${OPENWRT_TAG#v}"
          cd imagebuilder
          make image PROFILE="${PROFILE}" ROOTFS_PARTSIZE="${ROOTFS_PARTSIZE}" \
            PACKAGES="luci-ssl luci-compat dnsmasq-full -dnsmasq bash curl ca-bundle ip-full ruby ruby-yaml unzip kmod-tun kmod-inet-diag kmod-nft-tproxy ${EXTRA_PACKAGES}${remove_package_args}" \
            FILES="${GITHUB_WORKSPACE}/imagebuilder/files" \
            2>&1 | tee "${GITHUB_WORKSPACE}/build.log"

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          cp imagebuilder/.config artifacts/ || true
          cp build.log artifacts/ || true
          find imagebuilder/bin/targets/rockchip/armv8 -maxdepth 1 -type f \
            \( -name '*.img.gz' -o -name '*.itb' -o -name '*.manifest' -o -name 'sha256sums' -o -name 'profiles.json' -o -name 'config.buildinfo' -o -name 'feeds.buildinfo' -o -name 'version.buildinfo' \) \
            -exec cp {} artifacts/ \; || true
          if ls artifacts/* >/dev/null 2>&1; then
            sha256sum artifacts/* > artifacts/sha256sums
          fi
          ls -lah artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: easepi-r1-openwrt-${{ env.OPENWRT_TAG }}
          path: artifacts/
          if-no-files-found: warn

      - name: Publish release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: easepi-r1-${{ env.OPENWRT_TAG }}
          name: EasePi R1 ${{ env.OPENWRT_TAG }}
          generate_release_notes: true
          files: |
            artifacts/*
